version: "3.9"

networks:
  rental_network:
    driver: bridge

volumes:
  primary_data:
  replica_data:
  pgadmin_data:

services:

  # ================= PostgreSQL Primary (Read/Write) =================
  postgres_primary:
    build:
      context: ./postgres/primary
    container_name: postgres_primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - primary_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rental_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ================= PostgreSQL Replica (Read Only, Streaming Replication) =================
  postgres_replica:
    build:
      context: ./postgres/replica
    container_name: postgres_replica
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      PRIMARY_HOST: postgres_primary
      PGPASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - replica_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - rental_network
    depends_on:
      postgres_primary:
        condition: service_healthy

  # ================= Redis Cache =================
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - rental_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ================= Django Backend Instance 1 =================
  backend_1:
    build:
      context: ./backend
    container_name: backend_1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INSTANCE_NAME: backend_1
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rental_network
    volumes:
      - ./backend:/app

  # ================= Django Backend Instance 2 =================
  backend_2:
    build:
      context: ./backend
    container_name: backend_2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INSTANCE_NAME: backend_2
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rental_network
    volumes:
      - ./backend:/app

  # ================= Nginx Reverse Proxy & Load Balancer =================
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend_1
      - backend_2
    networks:
      - rental_network

  # ================= pgAdmin =================
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - rental_network
    depends_on:
      - postgres_primary
      - postgres_replica
